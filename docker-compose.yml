services:

  # ─────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: faitmaison_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-faitmaison}
      POSTGRES_USER:     ${DB_USER:-faitmaison_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-faitmaison_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-faitmaison_user} -d ${DB_NAME:-faitmaison}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend Node.js
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faitmaison_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:  ${NODE_ENV:-development}
      PORT:      3000
      HOST:      0.0.0.0

      # Base de données — pointe vers le service postgres ci-dessus
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-faitmaison}
      DB_USER:     ${DB_USER:-faitmaison_user}
      DB_PASSWORD: ${DB_PASSWORD:-faitmaison_pass}

      # JWT
      JWT_SECRET:         ${JWT_SECRET}
      JWT_EXPIRES_IN:     ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

      # Admin (utilisé par npm run seed — PAS de fallback hardcodé)
      ADMIN_EMAIL:    ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Email — Resend
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM:      ${MAIL_FROM}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:    ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # Orange Money
      ORANGE_CLIENT_ID:      ${ORANGE_CLIENT_ID}
      ORANGE_CLIENT_SECRET:  ${ORANGE_CLIENT_SECRET}
      ORANGE_MERCHANT_KEY:   ${ORANGE_MERCHANT_KEY}
      ORANGE_API_BASE:       ${ORANGE_API_BASE}
      ORANGE_WEBHOOK_SECRET: ${ORANGE_WEBHOOK_SECRET}
      ORANGE_RETURN_URL:     ${ORANGE_RETURN_URL}
      ORANGE_CANCEL_URL:     ${ORANGE_CANCEL_URL}
      ORANGE_NOTIF_URL:      ${ORANGE_NOTIF_URL}

      # Firebase FCM
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}

volumes:
  postgres_data:
